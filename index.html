<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nzinga Talent OS</title>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-error" style="display:none;padding:32px;font-family:monospace;color:#dc2626;white-space:pre-wrap;"></div>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('boot-error');
        if (el) { el.style.display = 'block'; el.textContent += e.message + '\n' + (e.filename || '') + ':' + (e.lineno || '') + '\n\n'; }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var el = document.getElementById('boot-error');
        if (el) { el.style.display = 'block'; el.textContent += 'Unhandled Promise: ' + (e.reason && e.reason.message || e.reason || 'unknown') + '\n\n'; }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
